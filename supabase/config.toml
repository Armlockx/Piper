# Piper Supabase local config
project_id = "piper"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Include /auth/verify for optional email verification callback
additional_redirect_urls = ["http://localhost:3000/**", "http://localhost:3000/auth/verify"]

[auth.email]
enable_signup = true
# OFF = immediate login. Optional verification uses profiles.email_verified_at (see migration 005).
# Mirror this in Dashboard → Authentication → Providers → Email → Confirm email = OFF.
enable_confirmations = false
