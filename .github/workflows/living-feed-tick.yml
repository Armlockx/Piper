name: Living feed tick

# Light activity every 5 minutes. GitHub may delay schedules on free repos.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call activity tick
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_URL or CRON_SECRET repo secrets"
            exit 1
          fi
          # Strip trailing slash
          BASE="${APP_URL%/}"
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE}/api/cron/activity?mode=tick"
